name: Build and Push Docker Image

# This tells the robot to run every time you push to the 'main' branch
on:
  push:
    branches:
      - main
    # We tell it to ignore changes to the Helm chart so it doesn't build unnecessarily
    paths-ignore:
      - 'my-pos-chart/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # We tag it as 'latest' so it always has the newest code
          tags: ${{ secrets.DOCKER_USERNAME }}/cloud-native-pos:latest